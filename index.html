<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Weather Spi Quran</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            background: transparent;
            overflow: hidden;
            width: 180px;
            height: 240px;
        }
        .weather-box {
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #1e3a5f 0%, #0d1b2a 100%);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 4px;
            padding: 10px;
            color: #ffffff;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .city-name {
            font-size: 16px;
            font-weight: 700;
            color: #ffd700;
            margin-bottom: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 6px;
        }
        .temp-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 10px 0;
        }
        .temp-icon { font-size: 32px; }
        .temp-value {
            font-size: 28px;
            font-weight: 700;
        }
        .wind-info {
            font-size: 11px;
            color: rgba(255,255,255,0.8);
            margin: 8px 0;
        }
        .logo-area {
            margin-top: 10px;
            padding-top: 8px;
            border-top: 1px solid rgba(255,255,255,0.15);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .gk-logo-img {
            width: 60px;
            height: auto;
            margin-bottom: 4px;
        }
        .gk-text {
            font-size: 10px;
            color: rgba(255,255,255,0.7);
            line-height: 1.3;
        }
    </style>
<base target="_blank">
</head>
<body>
    <div id="weather-widget"></div>
    <script>
        const cities = [
            { name: 'دهۆك', lat: 36.8679, lon: 42.9884 },
            { name: 'هەولێر', lat: 36.1911, lon: 44.0092 },
            { name: 'سلێمانی', lat: 35.5575, lon: 45.4350 },
            { name: 'هەڵەبجە', lat: 35.1776, lon: 45.9882 }
        ];
        let currentCityIndex = 0;
        const weatherCodes = {
            0: '☀️', 1: '🌤️', 2: '⛅', 3: '☁️', 45: '🌫️', 48: '🌫️',
            51: '🌦️', 53: '🌦️', 55: '🌧️', 56: '🌧️', 57: '🌧️',
            61: '🌧️', 63: '🌧️', 65: '⛈️', 66: '🌨️', 67: '🌨️',
            71: '🌨️', 73: '❄️', 75: '❄️', 77: '🌨️',
            80: '🌦️', 81: '🌧️', 82: '⛈️', 85: '🌨️', 86: '❄️',
            95: '⛈️', 96: '⛈️', 99: '⛈️'
        };
        function getIcon(code) { return weatherCodes[code] || '🌡️'; }
        async function fetchWeather(city) {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lon}&current=temperature_2m,weather_code,wind_speed_10m&timezone=Asia/Baghdad`);
                if (!res.ok) throw new Error('Error');
                const data = await res.json();
                const c = data.current;
                return { name: city.name, temp: Math.round(c.temperature_2m), icon: getIcon(c.weather_code), wind: Math.round(c.wind_speed_10m) };
            } catch (err) { return { name: city.name, temp: '--', icon: '⚠️', wind: '--' }; }
        }
        async function updateDisplay() {
            const city = cities[currentCityIndex];
            const data = await fetchWeather(city);
            document.getElementById('weather-widget').innerHTML = `
                <div class="weather-box">
                    <div class="city-name">${data.name}</div>
                    <div class="temp-row">
                        <span class="temp-icon">${data.icon}</span>
                        <span class="temp-value">${data.temp}°C</span>
                    </div>
                    <div class="wind-info">KPH ${data.wind} : شه‌مسی</div>
                    <div class="logo-area">
                        <img class="gk-logo-img" src="https://dso2.raed.net:454/files/LOGO-SPO_408af.png" alt="Spi Quran Logo">
                        <div class="gk-text">Spi Quran<br>HD</div>
                    </div>
                </div>`;
            currentCityIndex = (currentCityIndex + 1) % cities.length;
        }
        updateDisplay();
        setInterval(updateDisplay, 5000);
        setInterval(() => location.reload(), 300000);
    </script>
</body>
</html>
